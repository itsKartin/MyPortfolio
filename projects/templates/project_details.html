<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details</title>
</head>
<body>
    <h1>This is the Project in detail </h1>
    <img src="{{ project.image.url }}" alt="Project Image" width="400" height="300">
    <h2>{{ project.name }}</h2>
    <p>{{ project.description }}</p>
    <p>Created at: {{ project.created_at }}</p>
    <url>Project URL: <a href="{{ project.url }}">{{ project.url }}</a></url>
</body>
</html>
